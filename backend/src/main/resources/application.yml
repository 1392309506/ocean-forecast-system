spring:
  application:
    name: ocean-forecast-backend
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:ocean_forecast;MODE=MYSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true
      path: /h2-console

mybatis:
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    com.ocean.forecast: INFO
